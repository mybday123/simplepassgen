<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./src/style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Password Generator</title>
</head>

<body class="text-sm">
    <script src="src/main.ts" type="module"></script>
    <script src="src/slider.ts" type="module"></script>
    <div class="flex justify-center items-center h-screen">
        <fieldset class="h-100 w-auto border-2 p-4 rounded bg-gray-100">
            <legend>Simple Password Generator</legend>
            <span class="mr-4">Password length:</span>
            <input type="number" min="6" max="128" value="14" id="length" class="border bg-white rounded pl-1" />
            <br />
            <fieldset class="border border-gray-400 p-2 rounded">
                <legend>Generated password:</legend>
                <input type="text" readonly id="generatedPassword"
                    class="font-mono w-105 border rounded bg-white pl-1 pr-1 box-content" />
            </fieldset>
            <p>Length: <span id="lengthOutput"></span></p>
            <button type="button" id="generateButton"
                class="bg-gray-50 p-1 hover:bg-gray-200 rounded cursor-pointer border border-gray-400 active:bg-gray-300 drop-shadow-sm hover:drop-shadow-none">Generate
                password</button>
        </fieldset>
    </div>
</body>

</html>
